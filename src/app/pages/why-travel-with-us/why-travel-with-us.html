<app-banner
  [title]="bannerTitle"
  [backgroundImage]="backgroundImage"
></app-banner>

<section class="my-5 pt-5">
    <div class="container">
        <div class="detailsBox rounded-4 overflow-hidden">
            <div class="headBox text-center ">
                <button class="mainBtn mb-4 text-capitalize">
                    <i class="fa fa-location-dot me-2"></i>
                    <span>travel guide</span>
                </button>
                <h2 class="text-capitalize text-white position-relative">Why Nubatia Tours?</h2>
            </div>
            <div class="contentBox bg-white p-4 border">
                <ol>
                    @for(item of whyTravelWithUs; track item.title) {
                    <li>
                        <h5 class="fw-bold mb-3 textSecondColor">{{ item.title }}</h5>
                        <p [innerHTML]="sanitizer.bypassSecurityTrustHtml(item.description)"></p>
                    </li>
                    }
                </ol>
            </div>
        </div>
    </div>
</section>
