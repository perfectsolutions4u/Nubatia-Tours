<div class="row g-3">
  <div class="col-lg-3 col-sm-6" *ngFor="let feature of features">
    <div class="item bg-white p-3 rounded-3 flexCenter flex-column gap-3 text-center">
      <div [ngClass]="feature.class" class="iconBox bg-opacity-50">
        <i class="" [ngClass]="feature.icon"></i>
      </div>
      <h3 class="text-capitalize h5">{{ feature.title }}</h3>
      <p class="text-capitalize mb-0 text-muted fontsm">{{ feature.description }}</p>
    </div>
  </div>
</div>
